<!DOCTYPE html>
<html>
<head>
  <script
      type="text/javascript"
      src="/homey.js"
      data-origin="settings"
  ></script>
  <style>
    fieldset { margin-bottom: 16px; }
    legend { font-weight: bold; }
    .test-result { margin-top: 8px; font-size: 0.9em; }
  </style>
</head>
<body>
<h1 data-i18n="settings.title">
  <!-- This will be filled with the translated string with key 'settings.title'. -->
</h1>
<p data-i18n="settings.subtitle">
  <!-- This field will also be translated -->
</p>

<fieldset>
  <legend>Hub 1</legend>
  <div class="field row">
    <label for="udi">UDI</label>
    <input id="udi" type="text" value="" />
  </div>
  <div class="field row">
    <label for="username">Username</label>
    <input id="username" type="text" value="" />
  </div>
  <div class="field row">
    <label for="password">Password</label>
    <input id="password" type="password" value="" />
  </div>
  <button id="test1">Test connection</button>
  <p id="testResult1" class="test-result"></p>
</fieldset>

<fieldset>
  <legend>Hub 2 (optional)</legend>
  <div class="field row">
    <label for="udi2">UDI</label>
    <input id="udi2" type="text" value="" />
  </div>
  <div class="field row">
    <label for="username2">Username</label>
    <input id="username2" type="text" value="" />
  </div>
  <div class="field row">
    <label for="password2">Password</label>
    <input id="password2" type="password" value="" />
  </div>
  <button id="test2">Test connection</button>
  <p id="testResult2" class="test-result"></p>
</fieldset>

<button id="save" class="right">Save changes</button>
<br>
<p id="resultLabel"></p>

<script type="text/javascript">
  function onHomeyReady(Homey) {
    Homey.ready();

    let usernameElement = document.getElementById("username");
    let passwordElement = document.getElementById("password");
    let udiElement = document.getElementById("udi");
    let username2Element = document.getElementById("username2");
    let password2Element = document.getElementById("password2");
    let udi2Element = document.getElementById("udi2");
    let saveElement = document.getElementById("save");
    let resultLabelElement = document.getElementById("resultLabel");
    let test1Element = document.getElementById("test1");
    let test2Element = document.getElementById("test2");
    let testResult1Element = document.getElementById("testResult1");
    let testResult2Element = document.getElementById("testResult2");

    Homey.get("username", function (err, username) {
      if (err) return Homey.alert(err);
      usernameElement.value = username || '';
    });
    Homey.get("password", function (err, password) {
      if (err) return Homey.alert(err);
      passwordElement.value = password || '';
    });
    Homey.get("udi", function (err, udi) {
      if (err) return Homey.alert(err);
      udiElement.value = udi || '';
    });
    Homey.get("username2", function (err, username2) {
      if (err) return Homey.alert(err);
      username2Element.value = username2 || '';
    });
    Homey.get("password2", function (err, password2) {
      if (err) return Homey.alert(err);
      password2Element.value = password2 || '';
    });
    Homey.get("udi2", function (err, udi2) {
      if (err) return Homey.alert(err);
      udi2Element.value = udi2 || '';
    });

    function testConnection(hubNumber, resultElement) {
      resultElement.innerText = 'Testing...';
      resultElement.style.color = '';
      Homey.api('GET', '/test-connection', { hubNumber: hubNumber }, function (err, result) {
        if (err || !result || !result.success) {
          const message = (result && result.error) || (err && err.message) || 'Unknown error';
          resultElement.innerText = '✗ ' + message;
          resultElement.style.color = 'red';
        } else {
          resultElement.innerText = '✓ Connection successful!';
          resultElement.style.color = 'green';
        }
      });
    }

    test1Element.addEventListener("click", function () {
      testConnection(1, testResult1Element);
    });

    test2Element.addEventListener("click", function () {
      testConnection(2, testResult2Element);
    });

    saveElement.addEventListener("click", function (e) {
      resultLabelElement.innerText = 'Settings have been saved!';

      Homey.set("username", usernameElement.value, function (err) {
        if (err) { resultLabelElement.innerText = ''; return Homey.alert(err); }
      });
      Homey.set("password", passwordElement.value, function (err) {
        if (err) { resultLabelElement.innerText = ''; return Homey.alert(err); }
      });
      Homey.set("udi", udiElement.value, function (err) {
        if (err) { resultLabelElement.innerText = ''; return Homey.alert(err); }
      });
      Homey.set("username2", username2Element.value, function (err) {
        if (err) { resultLabelElement.innerText = ''; return Homey.alert(err); }
      });
      Homey.set("password2", password2Element.value, function (err) {
        if (err) { resultLabelElement.innerText = ''; return Homey.alert(err); }
      });
      Homey.set("udi2", udi2Element.value, function (err) {
        if (err) { resultLabelElement.innerText = ''; return Homey.alert(err); }
      });
    });
  }
</script>
</body>
</html>
